<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LabAmigo - Roteiros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/menu :: menu}"></div>
    <main class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div th:if="${erroEstoque}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
            <i class="bi bi-x-octagon-fill"></i> <strong th:text="${erroEstoque}"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card-table mt-4">
            <div class="table-header d-flex justify-content-between align-items-center mb-3">
                <h2>Roteiros Experimentais</h2>
                <a th:href="@{/roteiros/novo}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Novo Roteiro
                </a>
            </div>

            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${roteiros}">
                    <td th:text="${r.titulo}"></td>
                    <td th:text="${r.descricao}"></td>
                    <td>
                        <div class="acoes">
                            <a th:href="@{/roteiros/executar/{id}(id=${r.id})}" title="Executar Roteiro" onclick="return confirm('Deseja executar este roteiro? Os materiais serão descontados do estoque.')">
                                <i class="bi bi-play-circle-fill text-success fs-5 me-2"></i>
                            </a>
                            <a th:href="@{/roteiros/editar/{id}(id=${r.id})}" title="Editar">
                                <i class="bi bi-pencil-square text-primary me-2"></i>
                            </a>
                            <a th:href="@{/roteiros/excluir/{id}(id=${r.id})}" title="Excluir" onclick="return confirm('Confirmar exclusão?')">
                                <i class="bi bi-trash text-danger"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
