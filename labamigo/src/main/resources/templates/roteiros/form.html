<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LabAmigo - Formulário de Roteiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/menu :: menu}"></div>
    <main class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="card-form mt-4">
            <h2 th:text="${roteiro.id != null} ? 'Editar Roteiro Experimental' : 'Cadastro de Roteiro Experimental'"></h2>

            <form th:action="@{/roteiros/salvar}" th:object="${roteiro}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Título do Roteiro</label>
                    <input type="text" class="form-control" th:field="*{titulo}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descrição / Procedimento</label>
                    <textarea class="form-control" th:field="*{descricao}" rows="4" required></textarea>
                </div>

                <hr class="my-4">

                <h4><i class="bi bi-flask"></i> Insumos Necessários</h4>
                <div class="row g-3 align-items-end mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Selecione o Insumo</label>
                        <select class="form-select" id="selectInsumo">
                            <option value="">-- Escolha um Insumo --</option>
                            <option th:each="insumo : ${insumos}"
                                    th:value="${insumo.id}"
                                    th:text="${insumo.nome} + ' (' + ${insumo.unidadeMedida} + ')'">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Quantidade Necessária</label>
                        <input type="number" step="0.01" class="form-control" id="qtdInsumo" placeholder="0.00">
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="btn btn-success w-100" onclick="adicionarInsumo()">
                            <i class="bi bi-plus-circle"></i> Inserir
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-striped" id="tabelaItens">
                        <thead class="table-dark">
                        <tr>
                            <th>Insumo</th>
                            <th>Quantidade</th>
                            <th style="width: 100px;">Ações</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${itensExistentes}">
                            <td th:text="${item.insumo.nome} + ' (' + ${item.insumo.unidadeMedida} + ')'">
                                <input type="hidden" name="insumoIds" th:value="${item.insumo.id}">
                            </td>
                            <td>
                                <span th:text="${item.quantidadeNecessaria}"></span>
                                <input type="hidden" name="quantidades" th:value="${item.quantidadeNecessaria}">
                            </td>
                            <td class="text-center">
                                <button type="button" class="btn btn-danger btn-sm" onclick="removerLinha(this)">
                                    <i class="bi bi-trash"></i> Remover
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="form-buttons mt-4">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Salvar Alterações</button>
                    <a th:href="@{/roteiros}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function adicionarInsumo() {
        const select = document.getElementById('selectInsumo');
        const quantidadeInput = document.getElementById('qtdInsumo');

        const insumoId = select.value;
        const insumoTexto = select.options[select.selectedIndex].text;
        const quantidade = quantidadeInput.value;

        if (!insumoId || !quantidade || quantidade <= 0) {
            alert('Por favor, selecione um insumo e digite uma quantidade válida.');
            return;
        }

        const tbody = document.getElementById('tabelaItens').getElementsByTagName('tbody')[0];
        const novaLinha = tbody.insertRow();

        novaLinha.innerHTML = `
            <td>
                ${insumoTexto}
                <input type="hidden" name="insumoIds" value="${insumoId}">
            </td>
            <td>
                ${quantidade}
                <input type="hidden" name="quantidades" value="${quantidade}">
            </td>
            <td class="text-center">
                <button type="button" class="btn btn-danger btn-sm" onclick="removerLinha(this)">
                    <i class="bi bi-trash"></i> Remover
                </button>
            </td>
        `;

        select.value = "";
        quantidadeInput.value = "";
    }

    function removerLinha(botao) {
        const linha = botao.parentNode.parentNode;
        linha.parentNode.removeChild(linha);
    }
</script>
</body>
</html>
