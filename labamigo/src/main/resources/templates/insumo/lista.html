<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>LabAmigo - Insumos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<div class="layout">

    <div th:replace="~{fragments/menu :: menu}"></div>

    <main class="content">

        <div th:replace="~{fragments/header :: header}"></div>

        <div class="card-table">

            <div class="table-header">

                <h2>Insumos</h2>

                <a
                        th:href="@{/insumos/novo}"
                        class="btn btn-primary">

                    <i class="bi bi-plus-circle"></i>

                    Novo Insumo

                </a>

            </div>

            <table class="table align-middle">

                <thead>

                <tr>

                    <th>Nome</th>
                    <th>Estado</th>
                    <th>Quantidade</th>
                    <th>Unidade</th>
                    <th>Risco</th>
                    <th>Ações</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="item : ${insumos}">

                    <td th:text="${item.nome}"></td>

                    <td th:text="${item.estadoFisico}"></td>

                    <td th:text="${item.quantidade}"></td>

                    <td th:text="${item.unidadeMedida}"></td>

                    <td>

                        <span
                                class="badge-risco"
                                th:attr="data-risco=${item.classificacaoRisco}"
                                th:text="${item.classificacaoRisco}">
                        </span>

                    </td>

                    <td>

                        <div class="acoes">

                            <a
                                    th:href="@{/insumos/editar/{id}(id=${item.id})}"
                                    title="Editar">

                                <i class="bi bi-pencil-square text-primary"></i>

                            </a>

                            <a
                                    th:href="@{/insumos/excluir/{id}(id=${item.id})}"
                                    title="Excluir">

                                <i class="bi bi-trash text-danger"></i>

                            </a>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </main>

</div>

</body>

</html>
