<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Cadastro de Insumo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<div class="layout">

    <div th:replace="~{fragments/menu :: menu}"></div>

    <main class="content">

        <div th:replace="~{fragments/header :: header}"></div>

        <div class="card-form">

            <h2>

                <i class="bi bi-flask"></i>

                Cadastro de Insumo

            </h2>

            <form
                    th:action="@{/insumos}"
                    th:object="${insumo}"
                    method="post">

                <input
                        type="hidden"
                        th:field="*{id}">

                <div class="mb-3">

                    <label class="form-label">

                        Nome

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{nome}"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Estado Físico

                    </label>

                    <select
                            class="form-select"
                            th:field="*{estadoFisico}">

                        <option value="">
                            Selecione
                        </option>

                        <option value="Sólido">
                            Sólido
                        </option>

                        <option value="Líquido">
                            Líquido
                        </option>

                        <option value="Gasoso">
                            Gasoso
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Quantidade

                    </label>

                    <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            th:field="*{quantidade}">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Unidade de Medida

                    </label>

                    <select
                            class="form-select"
                            th:field="*{unidadeMedida}">

                        <option value="g">g</option>
                        <option value="Kg">Kg</option>
                        <option value="mL">mL</option>
                        <option value="L">L</option>
                        <option value="Unidade">Unidade</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Classificação de Risco

                    </label>

                    <select
                            class="form-select"
                            th:field="*{classificacaoRisco}">

                        <option value="">
                            Selecione
                        </option>

                        <option value="Não Perigoso">
                            Não Perigoso
                        </option>

                        <option value="Irritante">
                            Irritante
                        </option>

                        <option value="Corrosivo">
                            Corrosivo
                        </option>

                        <option value="Inflamável">
                            Inflamável
                        </option>

                        <option value="Oxidante">
                            Oxidante
                        </option>

                        <option value="Explosivo">
                            Explosivo
                        </option>

                        <option value="Tóxico">
                            Tóxico
                        </option>

                        <option value="Muito Tóxico">
                            Muito Tóxico
                        </option>

                        <option value="Perigoso ao Meio Ambiente">
                            Perigoso ao Meio Ambiente
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Quantidade para Alerta Médio

                    </label>

                    <input
                            type="number"
                            class="form-control"
                            th:field="*{qtdAlertaMedio}">

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Quantidade para Alerta Crítico

                    </label>

                    <input
                            type="number"
                            class="form-control"
                            th:field="*{qtdAlertaMinimo}">

                </div>
                <hr>

                <h4>Dados do Lote</h4>

                <div class="mb-3">

                    <label class="form-label">
                        Quantidade Recebida
                    </label>

                    <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            name="quantidade"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Descrição do Lote
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            name="descricaoLote"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Data de Validade
                    </label>

                    <input
                            type="date"
                            class="form-control"
                            name="dataValidade"
                            required>

                </div>

                <div class="form-buttons">

                    <button
                            type="submit"
                            class="btn btn-primary">

                        <i class="bi bi-check-circle"></i>

                        Salvar

                    </button>

                    <a
                            th:href="@{/insumos}"
                            class="btn btn-secondary">

                        <i class="bi bi-arrow-left"></i>

                        Voltar

                    </a>

                </div>

            </form>

        </div>

    </main>

</div>

</body>

</html>
