<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LabAmigo - Estoque Geral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/menu :: menu}"></div>
    <main class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="card-table mt-4">
            <div class="table-header">
                <h2><i class="bi bi-boxes"></i> Estoque</h2>
                <p class="text-muted">Visão consolidada da disponibilidade total de insumos no laboratório.</p>
            </div>

            <table class="table align-middle">
                <thead class="table-light">
                <tr>
                    <th>Nome do Insumo</th>
                    <th>Unidade</th>
                    <th>Quantidade Consolidada</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${itensEstoque}">
                    <td class="fw-bold" th:text="${item.nome}"></td>
                    <td th:text="${item.unidadeMedida}"></td>
                    <td>
                        <span class="badge rounded-pill fs-6"
                              th:classappend="${item.quantidade > 0 ? 'bg-success' : 'bg-danger'}"
                              th:text="${item.quantidade}">
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
