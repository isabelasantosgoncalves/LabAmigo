<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LabAmigo - Movimentações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .table-danger td { background-color: #f8d7da !important; color: #721c24 !important;}
        .table-warning td { background-color: #fff3cd !important; color: #856404 !important;}
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/menu :: menu}"></div>
    <main class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="card-table mt-4">
            <div class="table-header d-flex justify-content-between align-items-center mb-3">
                <h2>Movimentações (Entradas, Saídas e Lotes)</h2>
                <a th:href="@{/movimentacoes/novo}" class="btn btn-danger">
                    <i class="bi bi-box-arrow-right"></i> Registrar Perda
                </a>
            </div>

            <table class="table align-middle">
                <thead class="table-light">
                <tr>
                    <th>Insumo</th>
                    <th>Tipo</th>
                    <th>Quantidade</th>
                    <th>Lote / Motivo</th>
                    <th>Validade Lote</th>
                    <th>Status</th>
                    <th>Data Registro</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${movimentacoes}" th:classappend="${m.classeCor}">
                    <td class="fw-bold" th:text="${m.insumoNome}"></td>
                    <td>
                        <span th:if="${m.tipo == 'ENTRADA'}" class="badge bg-success">Entrada</span>
                        <span th:if="${m.tipo == 'SAIDA_EXECUCAO'}" class="badge bg-primary">Execução</span>
                        <span th:if="${m.tipo == 'SAIDA_PERDA'}" class="badge bg-danger">Perda</span>
                        <span th:if="${m.tipo == 'SAIDA'}" class="badge bg-danger">Perda</span>
                    </td>
                    <td th:text="${m.quantidade}"></td>
                    <td th:text="${m.descricaoLote}"></td>
                    <td th:text="${m.dataValidade != null ? #localDates.format(m.dataValidade, 'dd/MM/yyyy') : '-'}"></td>
                    <td>
                        <span class="pill-validade"
                              th:classappend="${m.statusValidade == 'VENCIDO'} ? 'pill-vencido' : (${m.statusValidade == 'ALERTA'} ? 'pill-alerta' : (${m.statusValidade == 'OK'} ? 'pill-ok' : 'pill-sem'))"
                              th:text="${m.statusValidade == 'VENCIDO'} ? 'Vencido' : (${m.statusValidade == 'ALERTA'} ? 'Vence em breve' : (${m.statusValidade == 'OK'} ? 'OK' : '—'))">
                        </span>
                    </td>
                    <td th:text="${#localDates.format(m.data, 'dd/MM/yyyy')}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
