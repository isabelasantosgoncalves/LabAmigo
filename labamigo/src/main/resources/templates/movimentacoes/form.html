<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LabAmigo - Registrar Perda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/menu :: menu}"></div>
    <main class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="card-form mt-4 border-danger">
            <h2 class="text-danger"><i class="bi bi-exclamation-triangle"></i> Registrar Perda de Material</h2>
            <p class="text-muted">A saída será computada no dia de hoje automaticamente.</p>

            <form th:action="@{/movimentacoes/salvar}" th:object="${movimentacao}" method="post">

                <div class="mb-3">
                    <label class="form-label">Material (Insumo)</label>
                    <select class="form-select" th:field="*{insumo.id}" required>
                        <option value="">Selecione...</option>
                        <option th:each="i : ${insumos}" th:value="${i.id}" th:text="${i.nome + ' (Estoque atual: ' + i.quantidade + ')'}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantidade Perdida/Descartada</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{quantidade}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Motivo (Descreva o que aconteceu)</label>
                    <input type="text" class="form-control" th:field="*{descricaoLote}" placeholder="Ex: Quebra de frasco, material contaminado..." required>
                </div>

                <div class="form-buttons mt-4">
                    <button type="submit" class="btn btn-danger"><i class="bi bi-check-circle"></i> Confirmar Baixa</button>
                    <a th:href="@{/movimentacoes}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
                </div>
            </form>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
