<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LabAmigo - Execuções</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/menu :: menu}"></div>
    <main class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div th:if="${sucesso}" class="alert alert-success mt-3">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${sucesso}"></span>
        </div>

        <div class="card-table mt-4">
            <div class="table-header">
                <h2>Histórico de Execuções</h2>
            </div>

            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Data e Hora</th>
                    <th>Roteiro Executado</th>
                    <th>Usuário</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${execucoes}">
                    <td th:text="${#temporals.format(e.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${e.roteiro.titulo}" class="fw-bold"></td>
                    <td th:text="${e.usuario != null ? e.usuario.nome : 'Sistema/Automático'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
