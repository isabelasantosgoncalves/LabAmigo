<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LabAmigo - Cadastro de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/menu :: menu}"></div>
    <main class="content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="card-form mt-4">
            <h2><i class="bi bi-person-plus"></i> Cadastro de Usuário</h2>

            <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" th:field="*{nome}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" th:field="*{email}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-control" th:field="*{senha}" required>
                </div>

                <div class="form-buttons mt-4">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Salvar Usuário</button>
                    <a th:href="@{/usuarios}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
                </div>
            </form>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
